<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1000" viewBox="0 0 1100 1000">
<style>.box{fill:white;stroke:black;stroke-width:1.5}.text{font-family:SimHei,Microsoft YaHei,Arial,sans-serif;font-size:11px;text-anchor:middle}.title{font-size:14px;font-weight:bold}.line{stroke:black;stroke-width:1.5;fill:none}.dashed{stroke:black;stroke-width:1.5;stroke-dasharray:5,5;fill:none}.arrow{fill:black}.lifeline{stroke:black;stroke-width:1.5;stroke-dasharray:5,5}</style>
<text x="550" y="25" class="text title">订单管理时序图</text>
<rect x="60" y="50" width="100" height="40" class="box"/><text x="110" y="75" class="text">用户</text>
<line x1="110" y1="90" x2="110" y2="970" class="lifeline"/>
<rect x="230" y="50" width="100" height="40" class="box"/><text x="280" y="75" class="text">前端页面</text>
<line x1="280" y1="90" x2="280" y2="970" class="lifeline"/>
<rect x="400" y="50" width="100" height="40" class="box"/><text x="450" y="75" class="text">Controller</text>
<line x1="450" y1="90" x2="450" y2="970" class="lifeline"/>
<rect x="570" y="50" width="100" height="40" class="box"/><text x="620" y="75" class="text">Service</text>
<line x1="620" y1="90" x2="620" y2="970" class="lifeline"/>
<rect x="740" y="50" width="100" height="40" class="box"/><text x="790" y="75" class="text">数据库</text>
<line x1="790" y1="90" x2="790" y2="970" class="lifeline"/>
<rect x="910" y="50" width="120" height="40" class="box"/><text x="970" y="75" class="text">支付平台</text>
<line x1="970" y1="90" x2="970" y2="970" class="lifeline"/>
<text x="550" y="120" class="text title">查询订单列表</text>
<line x1="110" y1="140" x2="280" y2="140" class="line"/><polygon points="280,140 270,135 270,145" class="arrow"/><text x="195" y="135" class="text">1:查看我的订单</text>
<line x1="280" y1="160" x2="450" y2="160" class="line"/><polygon points="450,160 440,155 440,165" class="arrow"/><text x="365" y="155" class="text">2:GET /order/list</text>
<line x1="450" y1="180" x2="620" y2="180" class="line"/><polygon points="620,180 610,175 610,185" class="arrow"/><text x="535" y="175" class="text">3:getOrderList()</text>
<line x1="620" y1="200" x2="790" y2="200" class="line"/><polygon points="790,200 780,195 780,205" class="arrow"/><text x="705" y="195" class="text">4:SELECT订单列表</text>
<line x1="790" y1="220" x2="620" y2="220" class="dashed"/><polygon points="620,220 630,215 630,225" class="arrow"/><text x="705" y="215" class="text">5:返回订单数据</text>
<line x1="620" y1="240" x2="450" y2="240" class="dashed"/><polygon points="450,240 460,235 460,245" class="arrow"/><text x="535" y="235" class="text">6:返回订单列表</text>
<line x1="450" y1="260" x2="280" y2="260" class="dashed"/><polygon points="280,260 290,255 290,265" class="arrow"/><text x="365" y="255" class="text">7:显示订单列表</text>
<text x="550" y="290" class="text title">查看订单详情</text>
<line x1="110" y1="310" x2="280" y2="310" class="line"/><polygon points="280,310 270,305 270,315" class="arrow"/><text x="195" y="305" class="text">8:点击订单</text>
<line x1="280" y1="330" x2="450" y2="330" class="line"/><polygon points="450,330 440,325 440,335" class="arrow"/><text x="365" y="325" class="text">9:GET /order/{id}</text>
<line x1="450" y1="350" x2="620" y2="350" class="line"/><polygon points="620,350 610,345 610,355" class="arrow"/><text x="535" y="345" class="text">10:getOrderDetail()</text>
<line x1="620" y1="370" x2="790" y2="370" class="line"/><polygon points="790,370 780,365 780,375" class="arrow"/><text x="705" y="365" class="text">11:SELECT订单详情</text>
<line x1="790" y1="390" x2="620" y2="390" class="dashed"/><polygon points="620,390 630,385 630,395" class="arrow"/><text x="705" y="385" class="text">12:返回详细信息</text>
<line x1="620" y1="410" x2="280" y2="410" class="dashed"/><polygon points="280,410 290,405 290,415" class="arrow"/><text x="450" y="405" class="text">13:返回订单详情</text>
<line x1="280" y1="430" x2="110" y2="430" class="dashed"/><polygon points="110,430 120,425 120,435" class="arrow"/><text x="195" y="425" class="text">14:显示订单详情</text>
<text x="550" y="460" class="text title">支付订单</text>
<line x1="110" y1="480" x2="280" y2="480" class="line"/><polygon points="280,480 270,475 270,485" class="arrow"/><text x="195" y="475" class="text">15:点击支付</text>
<line x1="280" y1="500" x2="450" y2="500" class="line"/><polygon points="450,500 440,495 440,505" class="arrow"/><text x="365" y="495" class="text">16:POST /order/pay</text>
<line x1="450" y1="520" x2="620" y2="520" class="line"/><polygon points="620,520 610,515 610,525" class="arrow"/><text x="535" y="515" class="text">17:payOrder()</text>
<rect x="600" y="535" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="620" y="550" class="text">验证</text>
<text x="620" y="565" class="text">订单</text>
<text x="620" y="580" class="text">状态</text>
<line x1="620" y1="575" x2="790" y2="575" class="line"/><polygon points="790,575 780,570 780,580" class="arrow"/><text x="705" y="570" class="text">18:UPDATE订单状态</text>
<line x1="790" y1="595" x2="620" y2="595" class="dashed"/><polygon points="620,595 630,590 630,600" class="arrow"/><text x="705" y="590" class="text">19:更新为支付中</text>
<line x1="620" y1="615" x2="970" y2="615" class="line"/><polygon points="970,615 960,610 960,620" class="arrow"/><text x="795" y="610" class="text">20:调用支付接口</text>
<rect x="950" y="630" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="970" y="645" class="text">处理</text>
<text x="970" y="660" class="text">支付</text>
<line x1="970" y1="670" x2="620" y2="670" class="dashed"/><polygon points="620,670 630,665 630,675" class="arrow"/><text x="795" y="665" class="text">21:支付成功回调</text>
<line x1="620" y1="690" x2="790" y2="690" class="line"/><polygon points="790,690 780,685 780,695" class="arrow"/><text x="705" y="685" class="text">22:UPDATE订单已支付</text>
<line x1="790" y1="710" x2="620" y2="710" class="dashed"/><polygon points="620,710 630,705 630,715" class="arrow"/><text x="705" y="705" class="text">23:更新成功</text>
<line x1="620" y1="730" x2="450" y2="730" class="dashed"/><polygon points="450,730 460,725 460,735" class="arrow"/><text x="535" y="725" class="text">24:支付成功响应</text>
<line x1="450" y1="750" x2="280" y2="750" class="dashed"/><polygon points="280,750 290,745 290,755" class="arrow"/><text x="365" y="745" class="text">25:显示支付成功</text>
<text x="550" y="780" class="text title">取消订单</text>
<line x1="110" y1="800" x2="280" y2="800" class="line"/><polygon points="280,800 270,795 270,805" class="arrow"/><text x="195" y="795" class="text">26:点击取消订单</text>
<line x1="280" y1="820" x2="450" y2="820" class="line"/><polygon points="450,820 440,815 440,825" class="arrow"/><text x="365" y="815" class="text">27:POST /order/cancel</text>
<line x1="450" y1="840" x2="620" y2="840" class="line"/><polygon points="620,840 610,835 610,845" class="arrow"/><text x="535" y="835" class="text">28:cancelOrder()</text>
<rect x="600" y="855" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="620" y="870" class="text">验证</text>
<text x="620" y="885" class="text">可否</text>
<text x="620" y="900" class="text">取消</text>
<line x1="620" y1="895" x2="790" y2="895" class="line"/><polygon points="790,895 780,890 780,900" class="arrow"/><text x="705" y="890" class="text">29:UPDATE订单已取消</text>
<line x1="790" y1="915" x2="620" y2="915" class="dashed"/><polygon points="620,915 630,910 630,920" class="arrow"/><text x="705" y="910" class="text">30:取消成功</text>
<line x1="620" y1="935" x2="280" y2="935" class="dashed"/><polygon points="280,935 290,930 290,940" class="arrow"/><text x="450" y="930" class="text">31:返回取消成功</text>
<line x1="280" y1="955" x2="110" y2="955" class="dashed"/><polygon points="110,955 120,950 120,960" class="arrow"/><text x="195" y="950" class="text">32:显示取消成功</text>
</svg>
