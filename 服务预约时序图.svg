<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="950" viewBox="0 0 1100 950">
<style>.box{fill:white;stroke:black;stroke-width:1.5}.text{font-family:SimHei,Microsoft YaHei,Arial,sans-serif;font-size:11px;text-anchor:middle}.title{font-size:14px;font-weight:bold}.line{stroke:black;stroke-width:1.5;fill:none}.dashed{stroke:black;stroke-width:1.5;stroke-dasharray:5,5;fill:none}.arrow{fill:black}.lifeline{stroke:black;stroke-width:1.5;stroke-dasharray:5,5}</style>
<text x="550" y="25" class="text title">服务预约时序图</text>
<rect x="60" y="50" width="100" height="40" class="box"/><text x="110" y="75" class="text">用户</text>
<line x1="110" y1="90" x2="110" y2="920" class="lifeline"/>
<rect x="230" y="50" width="100" height="40" class="box"/><text x="280" y="75" class="text">前端页面</text>
<line x1="280" y1="90" x2="280" y2="920" class="lifeline"/>
<rect x="400" y="50" width="100" height="40" class="box"/><text x="450" y="75" class="text">Controller</text>
<line x1="450" y1="90" x2="450" y2="920" class="lifeline"/>
<rect x="570" y="50" width="100" height="40" class="box"/><text x="620" y="75" class="text">Service</text>
<line x1="620" y1="90" x2="620" y2="920" class="lifeline"/>
<rect x="740" y="50" width="100" height="40" class="box"/><text x="790" y="75" class="text">数据库</text>
<line x1="790" y1="90" x2="790" y2="920" class="lifeline"/>
<rect x="910" y="50" width="100" height="40" class="box"/><text x="960" y="75" class="text">Redis缓存</text>
<line x1="960" y1="90" x2="960" y2="920" class="lifeline"/>
<line x1="110" y1="120" x2="280" y2="120" class="line"/><polygon points="280,120 270,115 270,125" class="arrow"/><text x="195" y="115" class="text">1:浏览服务详情</text>
<line x1="280" y1="140" x2="450" y2="140" class="line"/><polygon points="450,140 440,135 440,145" class="arrow"/><text x="365" y="135" class="text">2:GET /service/{id}</text>
<line x1="450" y1="160" x2="620" y2="160" class="line"/><polygon points="620,160 610,155 610,165" class="arrow"/><text x="535" y="155" class="text">3:getServiceById()</text>
<line x1="620" y1="180" x2="790" y2="180" class="line"/><polygon points="790,180 780,175 780,185" class="arrow"/><text x="705" y="175" class="text">4:SELECT服务信息</text>
<line x1="790" y1="200" x2="620" y2="200" class="dashed"/><polygon points="620,200 630,195 630,205" class="arrow"/><text x="705" y="195" class="text">5:返回服务详情</text>
<line x1="620" y1="220" x2="280" y2="220" class="dashed"/><polygon points="280,220 290,215 290,225" class="arrow"/><text x="450" y="215" class="text">6:显示服务详情</text>
<line x1="110" y1="240" x2="280" y2="240" class="line"/><polygon points="280,240 270,235 270,245" class="arrow"/><text x="195" y="235" class="text">7:点击立即预约</text>
<line x1="280" y1="260" x2="450" y2="260" class="line"/><polygon points="450,260 440,255 440,265" class="arrow"/><text x="365" y="255" class="text">8:GET /slots/{date}</text>
<line x1="450" y1="280" x2="620" y2="280" class="line"/><polygon points="620,280 610,275 610,285" class="arrow"/><text x="535" y="275" class="text">9:getAvailableSlots()</text>
<line x1="620" y1="300" x2="790" y2="300" class="line"/><polygon points="790,300 780,295 780,305" class="arrow"/><text x="705" y="295" class="text">10:查询时间段配置</text>
<line x1="790" y1="320" x2="620" y2="320" class="dashed"/><polygon points="620,320 630,315 630,325" class="arrow"/><text x="705" y="315" class="text">11:返回时间段列表</text>
<line x1="620" y1="340" x2="790" y2="340" class="line"/><polygon points="790,340 780,335 780,345" class="arrow"/><text x="705" y="335" class="text">12:统计已预约数量</text>
<line x1="790" y1="360" x2="620" y2="360" class="dashed"/><polygon points="620,360 630,355 630,365" class="arrow"/><text x="705" y="355" class="text">13:返回预约统计</text>
<rect x="600" y="375" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="620" y="390" class="text">计算</text>
<text x="620" y="405" class="text">可用</text>
<text x="620" y="420" class="text">状态</text>
<line x1="620" y1="415" x2="280" y2="415" class="dashed"/><polygon points="280,415 290,410 290,420" class="arrow"/><text x="450" y="410" class="text">14:返回可用时间段</text>
<line x1="280" y1="435" x2="110" y2="435" class="dashed"/><polygon points="110,435 120,430 120,440" class="arrow"/><text x="195" y="430" class="text">15:显示时间段列表</text>
<line x1="110" y1="455" x2="280" y2="455" class="line"/><polygon points="280,455 270,450 270,460" class="arrow"/><text x="195" y="450" class="text">16:选择时间段</text>
<line x1="110" y1="475" x2="280" y2="475" class="line"/><polygon points="280,475 270,470 270,480" class="arrow"/><text x="195" y="470" class="text">17:填写接收人信息</text>
<line x1="280" y1="495" x2="450" y2="495" class="line"/><polygon points="450,495 440,490 440,500" class="arrow"/><text x="365" y="490" class="text">18:POST /appointment</text>
<line x1="450" y1="515" x2="620" y2="515" class="line"/><polygon points="620,515 610,510 610,520" class="arrow"/><text x="535" y="510" class="text">19:createAppointment()</text>
<rect x="600" y="530" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="620" y="545" class="text">验证</text>
<text x="620" y="560" class="text">参数</text>
<line x1="620" y1="570" x2="620" y2="590" class="line"/><polygon points="620,590 615,580 625,580" class="arrow"/>
<line x1="620" y1="590" x2="790" y2="590" class="line"/><polygon points="790,590 780,585 780,595" class="arrow"/><text x="705" y="585" class="text">20:验证日期时间段</text>
<line x1="790" y1="610" x2="620" y2="610" class="dashed"/><polygon points="620,610 630,605 630,615" class="arrow"/><text x="705" y="605" class="text">21:验证通过</text>
<line x1="620" y1="630" x2="960" y2="630" class="line"/><polygon points="960,630 950,625 950,635" class="arrow"/><text x="790" y="625" class="text">22:获取分布式锁</text>
<line x1="960" y1="650" x2="620" y2="650" class="dashed"/><polygon points="620,650 630,645 630,655" class="arrow"/><text x="790" y="645" class="text">23:锁定成功</text>
<line x1="620" y1="670" x2="790" y2="670" class="line"/><polygon points="790,670 780,665 780,675" class="arrow"/><text x="705" y="665" class="text">24:SELECT FOR UPDATE</text>
<line x1="790" y1="690" x2="620" y2="690" class="dashed"/><polygon points="620,690 630,685 630,695" class="arrow"/><text x="705" y="685" class="text">25:锁定时间段记录</text>
<rect x="600" y="705" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="620" y="720" class="text">检查</text>
<text x="620" y="735" class="text">库存</text>
<line x1="620" y1="745" x2="620" y2="765" class="line"/><polygon points="620,765 615,755 625,755" class="arrow"/>
<rect x="600" y="765" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="620" y="780" class="text">生成</text>
<text x="620" y="795" class="text">预约</text>
<text x="620" y="810" class="text">编号</text>
<line x1="620" y1="805" x2="790" y2="805" class="line"/><polygon points="790,805 780,800 780,810" class="arrow"/><text x="705" y="800" class="text">26:INSERT预约记录</text>
<line x1="790" y1="825" x2="620" y2="825" class="dashed"/><polygon points="620,825 630,820 630,830" class="arrow"/><text x="705" y="820" class="text">27:插入成功</text>
<line x1="620" y1="845" x2="960" y2="845" class="line"/><polygon points="960,845 950,840 950,850" class="arrow"/><text x="790" y="840" class="text">28:释放分布式锁</text>
<line x1="620" y1="865" x2="450" y2="865" class="dashed"/><polygon points="450,865 460,860 460,870" class="arrow"/><text x="535" y="860" class="text">29:返回预约信息</text>
<line x1="450" y1="885" x2="280" y2="885" class="dashed"/><polygon points="280,885 290,880 290,890" class="arrow"/><text x="365" y="880" class="text">30:预约成功响应</text>
<line x1="280" y1="905" x2="110" y2="905" class="dashed"/><polygon points="110,905 120,900 120,910" class="arrow"/><text x="195" y="900" class="text">31:显示预约详情</text>
</svg>
