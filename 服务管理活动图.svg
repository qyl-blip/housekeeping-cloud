<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="950" viewBox="0 0 1000 950">
<style>.box{fill:white;stroke:black;stroke-width:1.5}.text{font-family:SimHei,Microsoft YaHei,Arial,sans-serif;font-size:11px;text-anchor:middle}.title{font-size:14px;font-weight:bold}.line{stroke:black;stroke-width:1.5;fill:none}.arrow{fill:black}.swimlane{fill:#f0f0f0;stroke:black;stroke-width:1}</style>
<text x="500" y="25" class="text title">服务管理活动图</text>
<rect x="50" y="50" width="220" height="850" class="swimlane"/><text x="160" y="70" class="text title">管理员</text>
<rect x="270" y="50" width="220" height="850" class="swimlane"/><text x="380" y="70" class="text title">前端系统</text>
<rect x="490" y="50" width="220" height="850" class="swimlane"/><text x="600" y="70" class="text title">后端Controller</text>
<rect x="710" y="50" width="240" height="850" class="swimlane"/><text x="830" y="70" class="text title">后端Service</text>
<circle cx="160" cy="100" r="15" fill="black"/><line x1="160" y1="115" x2="160" y2="140" class="line"/><polygon points="160,140 155,130 165,130" class="arrow"/>
<rect x="110" y="140" width="100" height="35" rx="5" class="box"/><text x="160" y="162" class="text">登录管理后台</text>
<line x1="160" y1="175" x2="160" y2="200" class="line"/><polygon points="160,200 155,190 165,190" class="arrow"/>
<rect x="100" y="200" width="120" height="35" rx="5" class="box"/><text x="160" y="222" class="text">进入服务管理</text>
<line x1="220" y1="217" x2="380" y2="217" class="line"/><polygon points="380,217 370,212 370,222" class="arrow"/>
<rect x="320" y="240" width="120" height="35" rx="5" class="box"/><text x="380" y="262" class="text">请求服务列表</text>
<line x1="440" y1="257" x2="600" y2="257" class="line"/><polygon points="600,257 590,252 590,262" class="arrow"/>
<rect x="530" y="280" width="140" height="35" rx="5" class="box"/><text x="600" y="302" class="text">getServiceList()</text>
<line x1="670" y1="297" x2="830" y2="297" class="line"/><polygon points="830,297 820,292 820,302" class="arrow"/>
<rect x="750" y="320" width="160" height="35" rx="5" class="box"/><text x="830" y="342" class="text">查询服务列表</text>
<line x1="750" y1="337" x2="380" y2="337" class="line"/><polygon points="380,337 390,332 390,342" class="arrow"/>
<rect x="320" y="360" width="120" height="35" rx="5" class="box"/><text x="380" y="382" class="text">显示服务列表</text>
<line x1="320" y1="377" x2="160" y2="377" class="line"/><polygon points="160,377 170,372 170,382" class="arrow"/>
<rect x="110" y="400" width="100" height="35" rx="5" class="box"/><text x="160" y="422" class="text">选择操作</text>
<line x1="160" y1="435" x2="160" y2="460" class="line"/><polygon points="160,460 155,450 165,450" class="arrow"/>
<path d="M 130 460 L 160 490 L 190 460 L 160 430 Z" class="box"/><text x="160" y="478" class="text">操作类型</text>
<line x1="190" y1="460" x2="260" y2="460" class="line"/><polygon points="260,460 250,455 250,465" class="arrow"/><text x="225" y="455" class="text">新增服务</text>
<rect x="320" y="470" width="120" height="35" rx="5" class="box"/><text x="380" y="492" class="text">显示新增表单</text>
<line x1="320" y1="487" x2="160" y2="487" class="line"/><polygon points="160,487 170,482 170,492" class="arrow"/>
<rect x="100" y="510" width="120" height="35" rx="5" class="box"/><text x="160" y="532" class="text">填写服务信息</text>
<line x1="220" y1="527" x2="380" y2="527" class="line"/><polygon points="380,527 370,522 370,532" class="arrow"/>
<rect x="320" y="550" width="120" height="35" rx="5" class="box"/><text x="380" y="572" class="text">上传服务图片</text>
