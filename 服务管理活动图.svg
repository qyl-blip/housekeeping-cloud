<rect x="530" y="580" width="140" height="35" rx="5" class="box"/><text x="600" y="602" class="text">getServiceById()</text>
<line x1="670" y1="597" x2="830" y2="597" class="line"/><polygon points="830,597 820,592 820,602" class="arrow"/>
<rect x="750" y="620" width="160" height="35" rx="5" class="box"/><text x="830" y="642" class="text">查询服务详情</text>
<line x1="750" y1="637" x2="380" y2="637" class="line"/><polygon points="380,637 390,632 390,642" class="arrow"/>
<rect x="320" y="660" width="120" height="35" rx="5" class="box"/><text x="380" y="682" class="text">回显服务信息</text>
<line x1="320" y1="677" x2="160" y2="677" class="line"/><polygon points="160,677 170,672 170,682" class="arrow"/>
<rect x="100" y="700" width="120" height="35" rx="5" class="box"/><text x="160" y="722" class="text">修改服务信息</text>
<line x1="220" y1="717" x2="380" y2="717" class="line"/><polygon points="380,717 370,712 370,722" class="arrow"/>
<rect x="320" y="740" width="120" height="35" rx="5" class="box"/><text x="380" y="762" class="text">提交修改</text>
<line x1="440" y1="757" x2="600" y2="757" class="line"/><polygon points="600,757 590,752 590,762" class="arrow"/>
<rect x="530" y="780" width="140" height="35" rx="5" class="box"/><text x="600" y="802" class="text">updateService()</text>
<line x1="670" y1="797" x2="830" y2="797" class="line"/><polygon points="830,797 820,792 820,802" class="arrow"/>
<rect x="750" y="820" width="160" height="35" rx="5" class="box"/><text x="830" y="842" class="text">更新服务记录</text>
<line x1="750" y1="837" x2="380" y2="837" class="line"/><polygon points="380,837 390,832 390,842" class="arrow"/>
<rect x="320" y="860" width="120" height="35" rx="5" class="box"/><text x="380" y="882" class="text">修改成功提示</text>
<line x1="130" y1="460" x2="50" y2="460" class="line"/><line x1="50" y1="460" x2="50" y2="520" class="line"/><polygon points="50,520 45,510 55,510" class="arrow"/><text x="70" y="455" class="text">删除服务</text>
<rect x="320" y="520" width="120" height="35" rx="5" class="box"/><text x="380" y="542" class="text">确认删除</text>
<line x1="440" y1="537" x2="600" y2="537" class="line"/><polygon points="600,537 590,532 590,542" class="arrow"/>
<rect x="530" y="560" width="140" height="35" rx="5" class="box"/><text x="600" y="582" class="text">deleteService()</text>
<line x1="670" y1="577" x2="830" y2="577" class="line"/><polygon points="830,577 820,572 820,582" class="arrow"/>
<rect x="750" y="600" width="160" height="35" rx="5" class="box"/><text x="830" y="622" class="text">检查服务引用</text>
<line x1="830" y1="635" x2="830" y2="660" class="line"/><polygon points="830,660 825,650 835,650" class="arrow"/>
<path d="M 800 660 L 830 690 L 860 660 L 830 630 Z" class="box"/><text x="830" y="678" class="text">可删除</text>
<line x1="860" y1="660" x2="920" y2="660" class="line"/><line x1="920" y1="660" x2="920" y2="577" class="line"/><line x1="920" y1="577" x2="910" y2="577" class="line"/><polygon points="910,577 920,572 920,582" class="arrow"/><text x="940" y="620" class="text">否</text>
<line x1="830" y1="690" x2="830" y2="715" class="line"/><polygon points="830,715 825,705 835,705" class="arrow"/><text x="850" y="705" class="text">是</text>
<rect x="750" y="715" width="160" height="35" rx="5" class="box"/><text x="830" y="737" class="text">删除服务记录</text>
<line x1="750" y1="732" x2="380" y2="732" class="line"/><polygon points="380,732 390,727 390,737" class="arrow"/>
<rect x="320" y="755" width="120" height="35" rx="5" class="box"/><text x="380" y="777" class="text">删除成功提示</text>
<line x1="320" y1="772" x2="160" y2="772" class="line"/><polygon points="160,772 170,767 170,777" class="arrow"/>
<circle cx="160" cy="810" r="15" fill="white" stroke="black" stroke-width="3"/><circle cx="160" cy="810" r="10" fill="black"/>
</svg>
