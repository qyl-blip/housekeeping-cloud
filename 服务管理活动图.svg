<rect x="320" y="670" width="120" height="35" rx="5" class="box"/><text x="380" y="692" class="text">提交服务信息</text>
<line x1="440" y1="687" x2="600" y2="687" class="line"/><polygon points="600,687 590,682 590,692" class="arrow"/>
<rect x="530" y="710" width="140" height="35" rx="5" class="box"/><text x="600" y="732" class="text">addService()</text>
<line x1="670" y1="727" x2="830" y2="727" class="line"/><polygon points="830,727 820,722 820,732" class="arrow"/>
<rect x="750" y="750" width="160" height="35" rx="5" class="box"/><text x="830" y="772" class="text">验证服务信息</text>
<line x1="830" y1="785" x2="830" y2="810" class="line"/><polygon points="830,810 825,800 835,800" class="arrow"/>
<rect x="750" y="810" width="160" height="35" rx="5" class="box"/><text x="830" y="832" class="text">插入服务记录</text>
<line x1="750" y1="827" x2="380" y2="827" class="line"/><polygon points="380,827 390,822 390,832" class="arrow"/>
<rect x="320" y="850" width="120" height="35" rx="5" class="box"/><text x="380" y="872" class="text">新增成功提示</text>
<line x1="160" y1="490" x2="160" y2="540" class="line"/><polygon points="160,540 155,530 165,530" class="arrow"/><text x="180" y="515" class="text">编辑服务</text>
<rect x="320" y="540" width="120" height="35" rx="5" class="box"/><text x="380" y="562" class="text">显示编辑表单</text>
