<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="900" viewBox="0 0 1000 900">
<style>.box{fill:white;stroke:black;stroke-width:1.5}.text{font-family:SimHei,Microsoft YaHei,Arial,sans-serif;font-size:11px;text-anchor:middle}.title{font-size:14px;font-weight:bold}.line{stroke:black;stroke-width:1.5;fill:none}.arrow{fill:black}.swimlane{fill:#f0f0f0;stroke:black;stroke-width:1}</style>
<text x="500" y="25" class="text title">订单管理活动图</text>
<rect x="50" y="50" width="220" height="800" class="swimlane"/><text x="160" y="70" class="text title">用户</text>
<rect x="270" y="50" width="220" height="800" class="swimlane"/><text x="380" y="70" class="text title">前端系统</text>
<rect x="490" y="50" width="220" height="800" class="swimlane"/><text x="600" y="70" class="text title">后端Controller</text>
<rect x="710" y="50" width="240" height="800" class="swimlane"/><text x="830" y="70" class="text title">后端Service</text>
<circle cx="160" cy="100" r="15" fill="black"/><line x1="160" y1="115" x2="160" y2="140" class="line"/><polygon points="160,140 155,130 165,130" class="arrow"/>
<rect x="110" y="140" width="100" height="35" rx="5" class="box"/><text x="160" y="162" class="text">查看我的订单</text>
<line x1="210" y1="157" x2="380" y2="157" class="line"/><polygon points="380,157 370,152 370,162" class="arrow"/>
<rect x="320" y="180" width="120" height="35" rx="5" class="box"/><text x="380" y="202" class="text">请求订单列表</text>
<line x1="440" y1="197" x2="600" y2="197" class="line"/><polygon points="600,197 590,192 590,202" class="arrow"/>
<rect x="530" y="220" width="140" height="35" rx="5" class="box"/><text x="600" y="242" class="text">getOrderList()</text>
<line x1="670" y1="237" x2="830" y2="237" class="line"/><polygon points="830,237 820,232 820,242" class="arrow"/>
<rect x="750" y="260" width="160" height="35" rx="5" class="box"/><text x="830" y="282" class="text">查询用户订单</text>
<line x1="750" y1="277" x2="380" y2="277" class="line"/><polygon points="380,277 390,272 390,282" class="arrow"/>
<rect x="320" y="300" width="120" height="35" rx="5" class="box"/><text x="380" y="322" class="text">显示订单列表</text>
<line x1="320" y1="317" x2="160" y2="317" class="line"/><polygon points="160,317 170,312 170,322" class="arrow"/>
<rect x="110" y="340" width="100" height="35" rx="5" class="box"/><text x="160" y="362" class="text">选择订单操作</text>
<line x1="160" y1="375" x2="160" y2="400" class="line"/><polygon points="160,400 155,390 165,390" class="arrow"/>
<path d="M 130 400 L 160 430 L 190 400 L 160 370 Z" class="box"/><text x="160" y="418" class="text">操作类型</text>
<line x1="190" y1="400" x2="260" y2="400" class="line"/><polygon points="260,400 250,395 250,405" class="arrow"/><text x="225" y="395" class="text">查看详情</text>
<rect x="320" y="410" width="120" height="35" rx="5" class="box"/><text x="380" y="432" class="text">请求订单详情</text>
<line x1="440" y1="427" x2="600" y2="427" class="line"/><polygon points="600,427 590,422 590,432" class="arrow"/>
<rect x="530" y="450" width="140" height="35" rx="5" class="box"/><text x="600" y="472" class="text">getOrderDetail()</text>
<line x1="670" y1="467" x2="830" y2="467" class="line"/><polygon points="830,467 820,462 820,472" class="arrow"/>
<rect x="750" y="490" width="160" height="35" rx="5" class="box"/><text x="830" y="512" class="text">查询订单详细信息</text>
<line x1="750" y1="507" x2="380" y2="507" class="line"/><polygon points="380,507 390,502 390,512" class="arrow"/>
<rect x="320" y="530" width="120" height="35" rx="5" class="box"/><text x="380" y="552" class="text">显示订单详情</text>
<line x1="160" y1="430" x2="160" y2="580" class="line"/><polygon points="160,580 155,570 165,570" class="arrow"/><text x="180" y="505" class="text">支付订单</text>
<rect x="110" y="580" width="100" height="35" rx="5" class="box"/><text x="160" y="602" class="text">点击支付</text>
<line x1="210" y1="597" x2="380" y2="597" class="line"/><polygon points="380,597 370,592 370,602" class="arrow"/>
<rect x="320" y="620" width="120" height="35" rx="5" class="box"/><text x="380" y="642" class="text">调起支付接口</text>
<line x1="440" y1="637" x2="600" y2="637" class="line"/><polygon points="600,637 590,632 590,642" class="arrow"/>
<rect x="530" y="660" width="140" height="35" rx="5" class="box"/><text x="600" y="682" class="text">payOrder()</text>
<line x1="670" y1="677" x2="830" y2="677" class="line"/><polygon points="830,677 820,672 820,682" class="arrow"/>
<rect x="750" y="700" width="160" height="35" rx="5" class="box"/><text x="830" y="722" class="text">更新订单状态</text>
<line x1="830" y1="735" x2="830" y2="760" class="line"/><polygon points="830,760 825,750 835,750" class="arrow"/>
<rect x="750" y="760" width="160" height="35" rx="5" class="box"/><text x="830" y="782" class="text">调用支付平台</text>
<line x1="750" y1="777" x2="380" y2="777" class="line"/><polygon points="380,777 390,772 390,782" class="arrow"/>
<rect x="320" y="800" width="120" height="35" rx="5" class="box"/><text x="380" y="822" class="text">支付成功提示</text>
<line x1="130" y1="400" x2="50" y2="400" class="line"/><line x1="50" y1="400" x2="50" y2="460" class="line"/><polygon points="50,460 45,450 55,450" class="arrow"/><text x="70" y="395" class="text">取消订单</text>
<rect x="320" y="460" width="120" height="35" rx="5" class="box"/><text x="380" y="482" class="text">确认取消</text>
<line x1="440" y1="477" x2="600" y2="477" class="line"/><polygon points="600,477 590,472 590,482" class="arrow"/>
<rect x="530" y="500" width="140" height="35" rx="5" class="box"/><text x="600" y="522" class="text">cancelOrder()</text>
<line x1="670" y1="517" x2="830" y2="517" class="line"/><polygon points="830,517 820,512 820,522" class="arrow"/>
<rect x="750" y="540" width="160" height="35" rx="5" class="box"/><text x="830" y="562" class="text">验证订单状态</text>
<line x1="830" y1="575" x2="830" y2="600" class="line"/><polygon points="830,600 825,590 835,590" class="arrow"/>
<path d="M 800 600 L 830 630 L 860 600 L 830 570 Z" class="box"/><text x="830" y="618" class="text">可取消</text>
<line x1="860" y1="600" x2="920" y2="600" class="line"/><line x1="920" y1="600" x2="920" y2="517" class="line"/><line x1="920" y1="517" x2="910" y2="517" class="line"/><polygon points="910,517 920,512 920,522" class="arrow"/><text x="940" y="560" class="text">否</text>
<line x1="830" y1="630" x2="830" y2="655" class="line"/><polygon points="830,655 825,645 835,645" class="arrow"/><text x="850" y="645" class="text">是</text>
<rect x="750" y="655" width="160" height="35" rx="5" class="box"/><text x="830" y="677" class="text">更新订单为已取消</text>
<line x1="750" y1="672" x2="380" y2="672" class="line"/><polygon points="380,672 390,667 390,677" class="arrow"/>
<rect x="320" y="695" width="120" height="35" rx="5" class="box"/><text x="380" y="717" class="text">取消成功提示</text>
<line x1="320" y1="712" x2="160" y2="712" class="line"/><polygon points="160,712 170,707 170,717" class="arrow"/>
<circle cx="160" cy="750" r="15" fill="white" stroke="black" stroke-width="3"/><circle cx="160" cy="750" r="10" fill="black"/>
</svg>
