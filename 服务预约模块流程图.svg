<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="850" viewBox="0 0 1000 850">
<style>.box{fill:white;stroke:black;stroke-width:1.5}.text{font-family:SimHei,Microsoft YaHei,Arial,sans-serif;font-size:12px;text-anchor:middle}.title{font-size:14px;font-weight:bold}.line{stroke:black;stroke-width:1.5;fill:none}.arrow{fill:black}</style>
<text x="500" y="30" class="text title">服务预约模块流程图</text>
<rect x="430" y="50" width="140" height="40" rx="20" class="box"/><text x="500" y="75" class="text">开始</text>
<line x1="500" y1="90" x2="500" y2="120" class="line"/><polygon points="500,120 495,110 505,110" class="arrow"/>
<rect x="430" y="120" width="140" height="40" class="box"/><text x="500" y="145" class="text">用户浏览服务详情</text>
<line x1="500" y1="160" x2="500" y2="190" class="line"/><polygon points="500,190 495,180 505,180" class="arrow"/>
<rect x="430" y="190" width="140" height="40" class="box"/><text x="500" y="215" class="text">点击立即预约</text>
<line x1="500" y1="230" x2="500" y2="260" class="line"/><polygon points="500,260 495,250 505,250" class="arrow"/>
<rect x="430" y="260" width="140" height="40" class="box"/><text x="500" y="285" class="text">选择预约日期</text>
<line x1="500" y1="300" x2="500" y2="340" class="line"/><polygon points="500,340 495,330 505,330" class="arrow"/>
<path d="M 450 340 L 500 380 L 550 340 L 500 300 Z" class="box"/><text x="500" y="365" class="text">日期有效</text>
<line x1="550" y1="340" x2="650" y2="340" class="line"/><line x1="650" y1="340" x2="650" y2="280" class="line"/><line x1="650" y1="280" x2="570" y2="280" class="line"/><polygon points="570,280 580,275 580,285" class="arrow"/><text x="670" y="310" class="text">否</text>
<line x1="500" y1="380" x2="500" y2="410" class="line"/><polygon points="500,410 495,400 505,400" class="arrow"/><text x="520" y="400" class="text">是</text>
<rect x="410" y="410" width="180" height="40" class="box"/><text x="500" y="435" class="text">查询可用时间段(实时统计)</text>
<line x1="500" y1="450" x2="500" y2="480" class="line"/><polygon points="500,480 495,470 505,470" class="arrow"/>
<rect x="410" y="480" width="180" height="40" class="box"/><text x="500" y="505" class="text">显示时间段列表(含剩余容量)</text>
<line x1="500" y1="520" x2="500" y2="550" class="line"/><polygon points="500,550 495,540 505,540" class="arrow"/>
<rect x="430" y="550" width="140" height="40" class="box"/><text x="500" y="575" class="text">用户选择时间段</text>
<line x1="500" y1="590" x2="500" y2="620" class="line"/><polygon points="500,620 495,610 505,610" class="arrow"/>
<rect x="390" y="620" width="220" height="40" class="box"/><text x="500" y="645" class="text">填写接收人信息(姓名/电话/地址)</text>
<line x1="500" y1="660" x2="500" y2="690" class="line"/><polygon points="500,690 495,680 505,680" class="arrow"/>
<rect x="430" y="690" width="140" height="40" class="box"/><text x="500" y="715" class="text">提交预约请求</text>
<line x1="500" y1="730" x2="500" y2="770" class="line"/><polygon points="500,770 495,760 505,760" class="arrow"/>
<rect x="350" y="770" width="300" height="50" class="box"/><text x="500" y="785" class="text">后端验证(SELECT FOR UPDATE)</text><text x="500" y="805" class="text">日期有效性/时间段容量/并发控制</text>
<line x1="650" y1="795" x2="730" y2="795" class="line"/><polygon points="730,795 720,790 720,800" class="arrow"/>
<path d="M 730 775 L 780 795 L 730 815 L 680 795 Z" class="box"/><text x="730" y="800" class="text">验证通过</text>
<line x1="730" y1="815" x2="730" y2="850" class="line"/><line x1="730" y1="850" x2="500" y2="850" class="line"/><line x1="500" y1="850" x2="500" y2="570" class="line"/><line x1="500" y1="570" x2="430" y2="570" class="line"/><polygon points="430,570 440,565 440,575" class="arrow"/><text x="750" y="835" class="text">否</text>
<line x1="780" y1="795" x2="850" y2="795" class="line"/><polygon points="850,795 840,790 840,800" class="arrow"/><text x="815" y="790" class="text">是</text>
<rect x="780" y="410" width="140" height="40" class="box"/><text x="850" y="435" class="text">生成预约编号</text>
<line x1="850" y1="450" x2="850" y2="480" class="line"/><polygon points="850,480 845,470 855,470" class="arrow"/>
<rect x="780" y="480" width="140" height="40" class="box"/><text x="850" y="505" class="text">插入预约记录</text>
<line x1="850" y1="520" x2="850" y2="550" class="line"/><polygon points="850,550 845,540 855,540" class="arrow"/>
<rect x="780" y="550" width="140" height="40" class="box"/><text x="850" y="575" class="text">返回预约成功及编号</text>
<line x1="850" y1="590" x2="850" y2="620" class="line"/><polygon points="850,620 845,610 855,610" class="arrow"/>
<rect x="780" y="620" width="140" height="40" class="box"/><text x="850" y="645" class="text">跳转到我的预约</text>
<line x1="850" y1="660" x2="850" y2="690" class="line"/><polygon points="850,690 845,680 855,680" class="arrow"/>
<rect x="780" y="690" width="140" height="40" rx="20" class="box"/><text x="850" y="715" class="text">结束</text>
</svg>