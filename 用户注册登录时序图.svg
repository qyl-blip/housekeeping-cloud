<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800">
<style>.box{fill:white;stroke:black;stroke-width:1.5}.text{font-family:SimHei,Microsoft YaHei,Arial,sans-serif;font-size:11px;text-anchor:middle}.title{font-size:14px;font-weight:bold}.line{stroke:black;stroke-width:1.5;fill:none}.dashed{stroke:black;stroke-width:1.5;stroke-dasharray:5,5;fill:none}.arrow{fill:black}.lifeline{stroke:black;stroke-width:1.5;stroke-dasharray:5,5}</style>
<text x="500" y="25" class="text title">用户注册登录时序图</text>
<rect x="80" y="50" width="100" height="40" class="box"/><text x="130" y="75" class="text">用户</text>
<line x1="130" y1="90" x2="130" y2="750" class="lifeline"/>
<rect x="280" y="50" width="100" height="40" class="box"/><text x="330" y="75" class="text">前端页面</text>
<line x1="330" y1="90" x2="330" y2="750" class="lifeline"/>
<rect x="480" y="50" width="100" height="40" class="box"/><text x="530" y="75" class="text">Controller</text>
<line x1="530" y1="90" x2="530" y2="750" class="lifeline"/>
<rect x="680" y="50" width="100" height="40" class="box"/><text x="730" y="75" class="text">Service</text>
<line x1="730" y1="90" x2="730" y2="750" class="lifeline"/>
<rect x="880" y="50" width="100" height="40" class="box"/><text x="930" y="75" class="text">数据库</text>
<line x1="930" y1="90" x2="930" y2="750" class="lifeline"/>
<text x="500" y="120" class="text title">注册流程</text>
<line x1="130" y1="140" x2="330" y2="140" class="line"/><polygon points="330,140 320,135 320,145" class="arrow"/><text x="230" y="135" class="text">1:访问注册页面</text>
<line x1="330" y1="160" x2="130" y2="160" class="dashed"/><polygon points="130,160 140,155 140,165" class="arrow"/><text x="230" y="155" class="text">2:显示注册表单</text>
<line x1="130" y1="180" x2="330" y2="180" class="line"/><polygon points="330,180 320,175 320,185" class="arrow"/><text x="230" y="175" class="text">3:填写用户信息</text>
<line x1="330" y1="200" x2="530" y2="200" class="line"/><polygon points="530,200 520,195 520,205" class="arrow"/><text x="430" y="195" class="text">4:POST /userRegister</text>
<line x1="530" y1="220" x2="730" y2="220" class="line"/><polygon points="730,220 720,215 720,225" class="arrow"/><text x="630" y="215" class="text">5:getUserByUserName()</text>
<line x1="730" y1="240" x2="930" y2="240" class="line"/><polygon points="930,240 920,235 920,245" class="arrow"/><text x="830" y="235" class="text">6:SELECT * FROM b_user</text>
<line x1="930" y1="260" x2="730" y2="260" class="dashed"/><polygon points="730,260 740,255 740,265" class="arrow"/><text x="830" y="255" class="text">7:返回查询结果</text>
<rect x="710" y="275" width="40" height="60" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="730" y="290" class="text">判断</text>
<text x="730" y="305" class="text">用户名</text>
<text x="730" y="320" class="text">是否</text>
<text x="730" y="335" class="text">存在</text>
<line x1="730" y1="335" x2="530" y2="335" class="dashed"/><polygon points="530,335 540,330 540,340" class="arrow"/><text x="630" y="330" class="text">8:用户名已存在(失败)</text>
<line x1="730" y1="355" x2="730" y2="375" class="line"/><polygon points="730,375 725,365 735,365" class="arrow"/><text x="780" y="365" class="text">用户名不存在</text>
<rect x="710" y="375" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="730" y="390" class="text">密码</text>
<text x="730" y="405" class="text">MD5</text>
<text x="730" y="420" class="text">加密</text>
<line x1="730" y1="415" x2="730" y2="435" class="line"/><polygon points="730,435 725,425 735,425" class="arrow"/>
<rect x="710" y="435" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="730" y="450" class="text">生成</text>
<text x="730" y="465" class="text">Token</text>
<line x1="730" y1="475" x2="930" y2="475" class="line"/><polygon points="930,475 920,470 920,480" class="arrow"/><text x="830" y="470" class="text">9:INSERT INTO b_user</text>
<line x1="930" y1="495" x2="730" y2="495" class="dashed"/><polygon points="730,495 740,490 740,500" class="arrow"/><text x="830" y="490" class="text">10:插入成功</text>
<line x1="730" y1="515" x2="530" y2="515" class="dashed"/><polygon points="530,515 540,510 540,520" class="arrow"/><text x="630" y="510" class="text">11:返回用户信息+Token</text>
<line x1="530" y1="535" x2="330" y2="535" class="dashed"/><polygon points="330,535 340,530 340,540" class="arrow"/><text x="430" y="530" class="text">12:注册成功响应</text>
<rect x="310" y="550" width="40" height="40" fill="#e0e0e0" stroke="black" stroke-width="1"/>
<text x="330" y="565" class="text">存储</text>
<text x="330" y="580" class="text">Token</text>
<line x1="330" y1="590" x2="130" y2="590" class="dashed"/><polygon points="130,590 140,585 140,595" class="arrow"/><text x="230" y="585" class="text">13:跳转到首页</text>
<text x="500" y="620" class="text title">登录流程</text>
<line x1="130" y1="640" x2="330" y2="640" class="line"/><polygon points="330,640 320,635 320,645" class="arrow"/><text x="230" y="635" class="text">1:输入用户名密码</text>
<line x1="330" y1="660" x2="530" y2="660" class="line"/><polygon points="530,660 520,655 520,665" class="arrow"/><text x="430" y="655" class="text">2:POST /userLogin</text>
<line x1="530" y1="680" x2="730" y2="680" class="line"/><polygon points="730,680 720,675 720,685" class="arrow"/><text x="630" y="675" class="text">3:getNormalUser()</text>
<line x1="730" y1="700" x2="930" y2="700" class="line"/><polygon points="930,700 920,695 920,705" class="arrow"/><text x="830" y="695" class="text">4:SELECT验证密码</text>
<line x1="930" y1="720" x2="730" y2="720" class="dashed"/><polygon points="730,720 740,715 740,725" class="arrow"/><text x="830" y="715" class="text">5:返回用户信息</text>
<line x1="730" y1="740" x2="330" y2="740" class="dashed"/><polygon points="330,740 340,735 340,745" class="arrow"/><text x="530" y="735" class="text">6:登录成功,返回Token</text>
</svg>